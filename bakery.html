<!DOCTYPE html>
<html>
<head>
    <title>Bakery Café</title>
    <style>
        body {
            font-family: Georgia;
            background: #fff8f0;
            margin: 0;
        }

        header {
            text-align: center;
            padding: 30px;
            background: #f4a261;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 900px;
            margin: auto;
            padding: 30px;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>Bakery Café</h1>
</header>

<div class="grid">

    <div class="box">
        <h3>Croissants</h3>
        <p>Fresh baked daily</p>
    </div>

    <div class="box">
        <h3>Cakes</h3>
        <p>Custom birthday cakes</p>
    </div>

</div>

</body>
</html>
